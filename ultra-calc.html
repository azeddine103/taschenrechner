<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ultra-Calc</title>
<link rel="icon" type="image/png" href="calculator.png">
<link rel="apple-touch-icon" href="calculator.png">
<style>
:root {
  --bg:      #0f172a;
  --card:    #1e293b;
  --card2:   #243447;
  --accent:  #38bdf8;
  --text:    #f8fafc;
  --muted:   #64748b;
  --dim:     #334155;
  --op:      #0ea5e9;
  --sci:     #0f2236;
  --sci-fg:  #7dd3fc;
  --prog:    #0f1f14;
  --prog-fg: #6ee7b7;
  --err:     #ef4444;
  --eq:      #0284c7;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
  position: relative;
}

/* ═══════════════════════════════════════
   VERLAUF DRAWER (Overlay)
═══════════════════════════════════════ */
#hist-overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 100;
}
#hist-overlay.open { display: flex; flex-direction: column; }

#hist-panel {
  background: #111827;
  border-bottom: 2px solid var(--dim);
  display: flex;
  flex-direction: column;
  max-height: 70dvh;
  animation: slideDown 0.2s ease;
}
@keyframes slideDown {
  from { transform: translateY(-20px); opacity: 0; }
  to   { transform: translateY(0);     opacity: 1; }
}

.hist-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px 8px;
  border-bottom: 1px solid var(--dim);
  flex-shrink: 0;
}
.hist-hdr span { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
.hist-hdr-btns { display: flex; gap: 8px; }
.hist-hdr-btns button {
  background: none; border: none; cursor: pointer;
  font-size: 0.72rem; padding: 3px 8px; border-radius: 4px;
  color: var(--muted);
}
.hist-hdr-btns button:hover { background: rgba(255,255,255,0.06); color: var(--text); }
.hist-hdr-btns .btn-del:hover { color: var(--err); }

#hist-list {
  overflow-y: auto;
  padding: 6px 12px 10px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.hline {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 8px;
  padding: 5px 10px;
  border-radius: 5px;
  cursor: pointer;
  transition: background 0.12s;
}
.hline:hover { background: rgba(255,255,255,0.05); }
.hline .he { font-size: 0.78rem; color: var(--muted); flex: 1; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.hline .hr { font-size: 0.88rem; color: var(--accent); white-space: nowrap; }

/* ═══════════════════════════════════════
   DISPLAY STACK (max 6 Zeilen)
═══════════════════════════════════════ */
#display {
  flex: 0 0 auto;
  padding: 8px 14px 10px;
  background: rgba(0,0,0,0.25);
  display: flex;
  flex-direction: column;
  gap: 1px;
  min-height: 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  position: relative;
}

/* Verlauf-Icon oben links im Display */
#hist-icon {
  position: absolute;
  top: 7px;
  left: 10px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 6px;
  border-radius: 6px;
  color: var(--muted);
  font-size: 1rem;
  line-height: 1;
  transition: color 0.15s, background 0.15s;
  z-index: 10;
  -webkit-tap-highlight-color: transparent;
}
#hist-icon:hover { color: var(--accent); background: rgba(56,189,248,0.08); }
#hist-icon svg { display: block; width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

.stack-line {
  text-align: right;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: opacity 0.15s;
}
.stack-line.old     { font-size: 0.78rem; color: var(--muted); opacity: 0.55; }
.stack-line.recent  { font-size: 0.82rem; color: var(--muted); opacity: 0.75; }
.stack-line.current { font-size: clamp(1.5rem, 5.5vw, 2.8rem); font-weight: 300; color: var(--text); }

/* Basis-Anzeige (Hex/Bin) */
#base-display {
  display: none;
  padding: 2px 14px 4px;
  gap: 8px;
  background: rgba(0,0,0,0.2);
}
#base-display.visible { display: flex; justify-content: flex-end; flex-wrap: wrap; }
.base-badge {
  font-size: 0.68rem;
  padding: 2px 7px;
  border-radius: 10px;
  background: var(--dim);
  color: var(--muted);
  font-family: monospace;
}
.base-badge b { color: var(--prog-fg); }

/* ═══════════════════════════════════════
   TABS
═══════════════════════════════════════ */
.tabs {
  display: flex;
  background: #0a1120;
  border-bottom: 1px solid var(--dim);
  flex-shrink: 0;
}
.tab {
  flex: 1;
  padding: 7px 0;
  font-size: 0.72rem;
  text-align: center;
  cursor: pointer;
  color: var(--muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  border: none;
  background: none;
  transition: color 0.15s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

/* ═══════════════════════════════════════
   TASTATUR
═══════════════════════════════════════ */
.keypad {
  flex: 1;
  display: none;
  grid-gap: 1px;
  background: var(--dim);
  min-height: 0;
}
.keypad.active { display: grid; }

/* Standard: 5 Spalten */
#kp-std  { grid-template-columns: repeat(5, 1fr); }
/* Wissenschaftlich: 5 Spalten */
#kp-sci  { grid-template-columns: repeat(5, 1fr); }
/* Programmierung: 4 Spalten */
#kp-prog { grid-template-columns: repeat(4, 1fr); }

button {
  border: none;
  background: var(--card);
  color: var(--text);
  font-size: 1rem;
  cursor: pointer;
  transition: filter 0.07s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
button:active { filter: brightness(1.6); }

.b-op    { color: var(--accent); font-weight: 600; }
.b-sci   { background: var(--sci);  color: var(--sci-fg);  font-size: 0.78rem; }
.b-prog  { background: var(--prog); color: var(--prog-fg); font-size: 0.78rem; }
.b-eq    { background: var(--eq);   color: #fff; font-weight: 700; font-size: 1.25rem; }
.b-ac    { color: var(--err); font-weight: 600; }
.b-hist  { background: #1a2535; color: var(--accent); font-size: 0.78rem; }
.b-hex   { background: #1a1a2e; color: #a78bfa; font-size: 0.88rem; font-weight: 600; font-family: monospace; }
.b-hex.disabled { opacity: 0.25; pointer-events: none; }
</style>
</head>
<body>

<!-- ═══ VERLAUF OVERLAY ═══ -->
<div id="hist-overlay" onclick="closeHistory(event)">
  <div id="hist-panel">
    <div class="hist-hdr">
      <span>Verlauf (letzte 50)</span>
      <div class="hist-hdr-btns">
        <button class="btn-del" onclick="clearHistory()">Löschen</button>
        <button onclick="closeHistoryPanel()">✕ Schließen</button>
      </div>
    </div>
    <div id="hist-list"></div>
  </div>
</div>

<!-- ═══ DISPLAY STACK ═══ -->
<div id="display">
  <button id="hist-icon" onclick="openHistory()" title="Verlauf">
    <svg viewBox="0 0 24 24"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/><path d="M3.05 11a9 9 0 1 1 .5 4M3 16v-5h5"/></svg>
  </button>
  <div class="stack-line current" id="main-line">0</div>
</div>
<div id="base-display"></div>

<!-- ═══ TABS ═══ -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('std')">Standard</button>
  <button class="tab"        onclick="switchTab('sci')">Wissenschaft</button>
  <button class="tab"        onclick="switchTab('prog')">Programmierung</button>
</div>

<!-- ══════════════════════════════════════════
     STANDARD (5 × 8)
══════════════════════════════════════════ -->
<div class="keypad active" id="kp-std">
  <button class="b-sci"  onclick="appendConst(Math.PI)">π</button>
  <button class="b-sci"  onclick="applyFunc('√',   x=>Math.sqrt(x))">√</button>
  <button class="b-sci"  onclick="applyFunc('x²',  x=>x*x)">x²</button>
  <button class="b-sci"  onclick="append('**')">xʸ</button>
  <button class="b-ac"   onclick="clearAll()">AC</button>

  <button class="b-sci"  onclick="applyFunc('ln',  x=>Math.log(x))">ln</button>
  <button class="b-sci"  onclick="applyFunc('log', x=>Math.log10(x))">log</button>
  <button class="b-sci"  onclick="append('(')">(</button>
  <button class="b-sci"  onclick="append(')')">)</button>
  <button class="b-op"   onclick="backspace()">⌫</button>

  <button onclick="append('7')">7</button>
  <button onclick="append('8')">8</button>
  <button onclick="append('9')">9</button>
  <button class="b-op"   onclick="append('/')">÷</button>
  <button class="b-sci"  onclick="append('%')">%</button>

  <button onclick="append('4')">4</button>
  <button onclick="append('5')">5</button>
  <button onclick="append('6')">6</button>
  <button class="b-op"   onclick="append('*')">×</button>
  <button class="b-op"   onclick="append('-')">−</button>

  <button onclick="append('1')">1</button>
  <button onclick="append('2')">2</button>
  <button onclick="append('3')">3</button>
  <button class="b-op"   onclick="append('+')">+</button>
  <button class="b-eq"   style="grid-row:span 2" onclick="calculate()">=</button>

  <button onclick="append('0')" style="grid-column:span 2">0</button>
  <button onclick="appendDot()">.</button>
  <button class="b-sci"  onclick="negate()">±</button>
</div>

<!-- ══════════════════════════════════════════
     WISSENSCHAFTLICH (5 × 9)
══════════════════════════════════════════ -->
<div class="keypad" id="kp-sci">
  <button class="b-sci"  id="deg-btn" onclick="toggleDeg()">DEG</button>
  <button class="b-sci"  onclick="append('(')">(</button>
  <button class="b-sci"  onclick="append('**')">xʸ</button>
  <button class="b-sci"  onclick="applyFunc('x²', x=>x*x)">x²</button>
  <button class="b-ac"   onclick="clearAll()">AC</button>

  <button class="b-sci"  onclick="applyFunc('sin',  x=>Math.sin(toRad(x)),  '°')">sin</button>
  <button class="b-sci"  onclick="applyFunc('cos',  x=>Math.cos(toRad(x)),  '°')">cos</button>
  <button class="b-sci"  onclick="applyFunc('tan',  x=>Math.tan(toRad(x)),  '°')">tan</button>
  <button class="b-sci"  onclick="applyFunc('sinh', x=>Math.sinh(x))">sinh</button>
  <button class="b-op"   onclick="backspace()">⌫</button>

  <button class="b-sci"  onclick="applyFunc('asin', x=>toDeg(Math.asin(x)))">asin</button>
  <button class="b-sci"  onclick="applyFunc('acos', x=>toDeg(Math.acos(x)))">acos</button>
  <button class="b-sci"  onclick="applyFunc('atan', x=>toDeg(Math.atan(x)))">atan</button>
  <button class="b-sci"  onclick="applyFunc('cosh', x=>Math.cosh(x))">cosh</button>
  <button class="b-sci"  onclick="applyFunc('tanh', x=>Math.tanh(x))">tanh</button>

  <button class="b-sci"  onclick="applyFunc('√',   x=>Math.sqrt(x))">√</button>
  <button class="b-sci"  onclick="applyFunc('∛',   x=>Math.cbrt(x))">∛</button>
  <button class="b-sci"  onclick="applyFunc('ln',  x=>Math.log(x))">ln</button>
  <button class="b-sci"  onclick="applyFunc('log', x=>Math.log10(x))">log</button>
  <button class="b-sci"  onclick="applyFunc('log₂',x=>Math.log2(x))">log₂</button>

  <button class="b-sci"  onclick="applyFunc('n!',  factorial)">n!</button>
  <button class="b-sci"  onclick="applyFunc('1/x', x=>1/x)">1/x</button>
  <button class="b-sci"  onclick="applyFunc('|x|', x=>Math.abs(x))">|x|</button>
  <button class="b-sci"  onclick="appendConst(Math.PI)">π</button>
  <button class="b-sci"  onclick="appendConst(Math.E)">e</button>

  <button onclick="append('7')">7</button>
  <button onclick="append('8')">8</button>
  <button onclick="append('9')">9</button>
  <button class="b-op"   onclick="append('/')">÷</button>
  <button class="b-sci"  onclick="append('%')">%</button>

  <button onclick="append('4')">4</button>
  <button onclick="append('5')">5</button>
  <button onclick="append('6')">6</button>
  <button class="b-op"   onclick="append('*')">×</button>
  <button class="b-op"   onclick="append('-')">−</button>

  <button onclick="append('1')">1</button>
  <button onclick="append('2')">2</button>
  <button onclick="append('3')">3</button>
  <button class="b-op"   onclick="append('+')">+</button>
  <button class="b-eq"   style="grid-row:span 2" onclick="calculate()">=</button>

  <button class="b-sci"  onclick="negate()">±</button>
  <button onclick="append('0')" style="grid-column:span 2">0</button>
  <button onclick="appendDot()">.</button>
</div>

<!-- ══════════════════════════════════════════
     PROGRAMMIERUNG (4 × 9)
══════════════════════════════════════════ -->
<div class="keypad" id="kp-prog">
  <!-- Basis-Umschalter -->
  <button class="b-prog" onclick="setBase(16)" id="b-HEX">HEX</button>
  <button class="b-prog" onclick="setBase(10)" id="b-DEC">DEC</button>
  <button class="b-prog" onclick="setBase(8)"  id="b-OCT">OCT</button>
  <button class="b-prog" onclick="setBase(2)"  id="b-BIN">BIN</button>

  <!-- Bit-Operationen -->
  <button class="b-prog" onclick="applyBitOp('AND')">AND</button>
  <button class="b-prog" onclick="applyBitOp('OR')">OR</button>
  <button class="b-prog" onclick="applyBitOp('XOR')">XOR</button>
  <button class="b-prog" onclick="applyUnaryBit('NOT', x=>~x)">NOT</button>

  <button class="b-prog" onclick="applyUnaryBit('<<1', x=>x<<1)">«</button>
  <button class="b-prog" onclick="applyUnaryBit('>>1', x=>x>>1)">»</button>
  <button class="b-prog" onclick="append('%')">MOD</button>
  <button class="b-ac"   onclick="clearAll()">AC</button>

  <!-- Hex-Ziffern A–F -->
  <button class="b-hex" id="hA" onclick="appendHex('A')">A</button>
  <button class="b-hex" id="hB" onclick="appendHex('B')">B</button>
  <button class="b-hex" id="hC" onclick="appendHex('C')">C</button>
  <button class="b-hex" id="hD" onclick="appendHex('D')">D</button>

  <button class="b-hex" id="hE" onclick="appendHex('E')">E</button>
  <button class="b-hex" id="hF" onclick="appendHex('F')">F</button>
  <button class="b-op"  onclick="backspace()">⌫</button>
  <button class="b-op"  onclick="append('/')">÷</button>

  <button onclick="append('7')" id="p7">7</button>
  <button onclick="append('8')" id="p8">8</button>
  <button onclick="append('9')" id="p9">9</button>
  <button class="b-op"  onclick="append('*')">×</button>

  <button onclick="append('4')" id="p4">4</button>
  <button onclick="append('5')" id="p5">5</button>
  <button onclick="append('6')" id="p6">6</button>
  <button class="b-op"  onclick="append('-')">−</button>

  <button onclick="append('1')">1</button>
  <button onclick="append('2')" id="p2">2</button>
  <button onclick="append('3')" id="p3">3</button>
  <button class="b-op"  onclick="append('+')">+</button>

  <button onclick="append('0')" style="grid-column:span 2">0</button>
  <button class="b-op" onclick="append('+')">+</button>
  <button class="b-eq" onclick="calculate()">=</button>
</div>

<script>
/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
const mainLineEl  = document.getElementById('main-line');
const displayEl   = document.getElementById('display');
const baseDisplay = document.getElementById('base-display');

let history = [];
try { history = JSON.parse(localStorage.getItem('ucalc_v4')) || []; } catch { history = []; }

let isResult   = false;
let useDeg     = true;     // Grad-Modus
let currentTab = 'std';
let progBase   = 10;       // Basis für Programmier-Modus
let pendingBitOp = null;   // { op, val }
let bitLhs       = null;

// Display-Stack: max 6 Einträge (neuestes = current)
let stack = []; // [{text, type}]  type: 'old'|'recent'|'current'

/* ════════════════════════════════════════
   DISPLAY STACK
════════════════════════════════════════ */
function getD() { return mainLineEl.innerText; }
function setD(v){ mainLineEl.innerText = v; }

function pushStack(expr, res) {
  // expr-Zeile
  stack.push({ text: `${expr} =`, type: 'old' });
  // res-Zeile (wird gleich als current überschrieben)
  // Älteste raus wenn > 12 Zeilen (6 Paare)
  while (stack.length > 10) stack.shift();
  renderStack(res);
}

function renderStack(currentVal) {
  displayEl.innerHTML = '';
  // Alle alten Zeilen
  const old = stack.slice(-10);
  old.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'stack-line ' + (i >= old.length - 2 ? 'recent' : 'old');
    div.innerText = item.text;
    displayEl.appendChild(div);
  });
  // Aktuelle Zeile
  const cur = document.createElement('div');
  cur.id = 'main-line';
  cur.className = 'stack-line current';
  cur.innerText = currentVal ?? getD();
  displayEl.appendChild(cur);
}

function resetDisplay(val = '0') {
  displayEl.innerHTML = '<div class="stack-line current" id="main-line">' + escHtml(val) + '</div>';
}

/* ════════════════════════════════════════
   HILFSFUNKTIONEN
════════════════════════════════════════ */
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmt(n) {
  if (!isFinite(n) || isNaN(n)) return 'Error';
  if (Number.isInteger(n)) return String(n);
  return parseFloat(n.toPrecision(12)).toString();
}
function toRad(x) { return useDeg ? x * Math.PI / 180 : x; }
function toDeg(x) { return useDeg ? x * 180 / Math.PI : x; }
function factorial(n) {
  n = Math.round(n);
  if (n < 0 || n > 170) return NaN;
  let r = 1; for (let i = 2; i <= n; i++) r *= i; return r;
}

/* ════════════════════════════════════════
   GRAD/RAD TOGGLE
════════════════════════════════════════ */
function toggleDeg() {
  useDeg = !useDeg;
  document.getElementById('deg-btn').innerText = useDeg ? 'DEG' : 'RAD';
}

/* ════════════════════════════════════════
   NEGIEREN  ±
   – Steht '0' im Display    → '-' voranstellen (neue negative Zahl)
   – Steht eine Zahl drin    → Vorzeichen toggeln
   – Nach einem Ergebnis     → Ergebnis negieren
   – Mitten in Ausdruck      → letzten Zahlen-Token negieren
════════════════════════════════════════ */
function negate() {
  let cur = mainLineEl.innerText;

  // Ergebnis direkt negieren
  if (isResult) {
    const n = parseFloat(cur);
    if (!isNaN(n)) {
      const neg = fmt(-n);
      mainLineEl.innerText = neg;
      // kein neues History-Item – nur Vorzeichen
    }
    return;
  }

  if (cur === '0') {
    mainLineEl.innerText = '-';
    return;
  }

  // Letzten Zahlen-Token (inkl. führendem -) finden und umkehren
  // Regex: letzter Block aus Ziffern, Punkt, optional führendem Minus
  const m = cur.match(/^(.*?)(-?\d+(?:\.\d*)?)$/);
  if (m) {
    const prefix = m[1];
    const token  = m[2];
    const negated = token.startsWith('-') ? token.slice(1) : '-' + token;
    // Klammern setzen falls nötig (nach Operator oder am Anfang mit -)
    const wrapped = negated.startsWith('-') && prefix.length > 0
      ? `(${negated})`
      : negated;
    mainLineEl.innerText = prefix + wrapped;
  } else {
    // Fallback: führendes Minuszeichen toggeln
    mainLineEl.innerText = cur.startsWith('-') ? cur.slice(1) : '-' + cur;
  }
  if (currentTab === 'prog') updateBaseDisplay();
}

/* ════════════════════════════════════════
   EINGABE  – führendes Minus erlauben
════════════════════════════════════════ */
function append(val) {
  const isOp = isNaN(val) && val !== '.';
  if (isResult) {
    if (isOp && val !== '-') { isResult = false; }
    else if (val === '-')    { stack = []; resetDisplay('-'); isResult = false; return; }
    else                     { stack = []; resetDisplay('0'); isResult = false; }
  }
  // mainLineEl kann sich durch resetDisplay neu erstellen
  const ml = document.getElementById('main-line');
  if (!ml) return;
  const cur = ml.innerText;

  // Verhindere doppelten Operator (außer Minus nach Operator für negative Zahl)
  const lastChar = cur.slice(-1);
  const isLastOp = '+-*/('.includes(lastChar);
  if (isOp && isLastOp && val !== '-') {
    // Operator ersetzen (außer wenn letzter char '(')
    if (lastChar !== '(') ml.innerText = cur.slice(0, -1) + val;
    return;
  }

  if ((cur === '0' || cur === '-0') && !isNaN(val) && val !== '.') {
    ml.innerText = cur.replace('0', val);
  } else {
    ml.innerText = cur + val;
  }
  if (currentTab === 'prog') updateBaseDisplay();
}

function appendDot() {
  if (isResult) { stack = []; resetDisplay('0'); isResult = false; }
  const ml = document.getElementById('main-line');
  if (!ml) return;
  const cur = ml.innerText;
  const tokens = cur.split(/[+\-*/()&|^]/);
  if (tokens[tokens.length - 1].includes('.')) return;
  ml.innerText = cur + '.';
}

function appendConst(v) {
  if (isResult) { stack = []; resetDisplay('0'); isResult = false; }
  const ml = document.getElementById('main-line');
  if (!ml) return;
  const rounded = parseFloat(v.toFixed(10));
  const cur = ml.innerText;
  ml.innerText = (cur === '0' || cur === '') ? String(rounded) : cur + rounded;
}

/* ════════════════════════════════════════
   FUNKTIONEN (sofort anwenden)
════════════════════════════════════════ */
function applyFunc(label, fn, unitSuffix = '') {
  const ml  = document.getElementById('main-line');
  if (!ml) return;
  const val = parseFloat(ml.innerText);
  if (isNaN(val)) { ml.innerText = 'Error'; isResult = true; return; }
  const result = fn(val);
  const res    = fmt(result);
  const expr   = `${label}(${val}${unitSuffix})`;
  pushStack(expr, res);
  saveHistory(expr, res);
  isResult = true;
  if (currentTab === 'prog') updateBaseDisplay();
}

/* ════════════════════════════════════════
   BERECHNUNG
════════════════════════════════════════ */
function safeEval(raw) {
  let expr = raw
    .replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-');

  // Prozent: 50% → (50/100)
  expr = expr.replace(/(-?\d+(?:\.\d+)?)%/g, '($1/100)');

  // Führendes Minus (z.B. "-3+5") → (0-3)+5 zum Parsen
  // Eigentlich Function() versteht "-3+5" direkt – kein Umbau nötig

  // Whitelist: nach Entfernung aller erlaubten Math-Tokens
  const stripped = expr.replace(
    /Math\.(sin|cos|tan|asin|acos|atan|sinh|cosh|tanh|sqrt|cbrt|log|log10|log2|abs|ceil|floor|round|PI|E|sign|hypot)\b/g, ''
  );
  // Erlaubt: Ziffern, Ops, Klammern, Hex a-f, Leerzeichen, **, e/E für Wissenschaftsnotation
  if (!/^[0-9a-fA-F+\-*/().eE\s*x&|^~<>]*$/.test(stripped))
    throw new Error('Ungültig');

  // eslint-disable-next-line no-new-func
  const result = Function('"use strict"; const Math=globalThis.Math; return (' + expr + ')')();
  if (!isFinite(result)) throw new Error('Nicht definiert');
  return result;
}

function calculate() {
  // Prog-Modus mit pending BitOp
  if (currentTab === 'prog' && pendingBitOp !== null) {
    const ml  = document.getElementById('main-line');
    const rhs = parseIntAnyBase(ml ? ml.innerText : '0');
    let result;
    if      (pendingBitOp === 'AND') result = (bitLhs & rhs) >>> 0;
    else if (pendingBitOp === 'OR')  result = (bitLhs | rhs) >>> 0;
    else if (pendingBitOp === 'XOR') result = (bitLhs ^ rhs) >>> 0;
    const res  = result.toString(progBase).toUpperCase();
    const expr = `${bitLhs.toString(progBase).toUpperCase()} ${pendingBitOp} ${rhs.toString(progBase).toUpperCase()}`;
    pushStack(expr, res);
    saveHistory(expr, res);
    pendingBitOp = null; bitLhs = null;
    isResult = true;
    updateBaseDisplay();
    return;
  }
  try {
    const ml   = document.getElementById('main-line');
    const expr = ml ? ml.innerText : '0';
    const result = safeEval(expr);
    const res    = fmt(result);
    pushStack(expr, res);
    saveHistory(expr, res);
    isResult = true;
    if (currentTab === 'prog') updateBaseDisplay();
  } catch {
    const ml = document.getElementById('main-line');
    if (ml) ml.innerText = 'Error';
    isResult = true;
  }
}

/* ════════════════════════════════════════
   AC / BACKSPACE
════════════════════════════════════════ */
function clearAll() {
  stack = [];
  resetDisplay('0');
  isResult = false;
  pendingBitOp = null; bitLhs = null;
  baseDisplay.classList.remove('visible');
}

function backspace() {
  if (isResult) { clearAll(); return; }
  const ml = document.getElementById('main-line');
  if (!ml) return;
  ml.innerText = ml.innerText.slice(0, -1) || '0';
  if (currentTab === 'prog') updateBaseDisplay();
}

function setBase(base) {
  progBase = base;
  ['HEX','DEC','OCT','BIN'].forEach(b => {
    const el = document.getElementById('b-'+b);
    const bVal = b==='HEX'?16:b==='DEC'?10:b==='OCT'?8:2;
    if (el) el.style.outline = bVal === base ? '2px solid var(--prog-fg)' : 'none';
  });
  ['A','B','C','D','E','F'].forEach(h => {
    const el = document.getElementById('h'+h);
    if (el) el.classList.toggle('disabled', base < 16);
  });
  for (let d = 2; d <= 9; d++) {
    const el = document.getElementById('p'+d);
    if (el) el.classList.toggle('disabled', base !== 16 && d >= base);
  }
  const ml = document.getElementById('main-line');
  if (ml) {
    const n = parseIntAnyBase(ml.innerText);
    if (!isNaN(n)) ml.innerText = n.toString(base).toUpperCase();
  }
  updateBaseDisplay();
}

function parseIntAnyBase(s) {
  s = String(s).trim();
  const neg = s.startsWith('-');
  const abs = s.replace(/^-/,'').toUpperCase();
  const n = /^[0-9A-F]+$/.test(abs) ? parseInt(abs, progBase) : parseInt(abs, 10);
  return neg ? -n : n;
}

function appendHex(h) {
  if (isResult) { stack = []; resetDisplay('0'); isResult = false; }
  const ml = document.getElementById('main-line');
  if (!ml) return;
  ml.innerText = ml.innerText === '0' ? h : ml.innerText + h;
  updateBaseDisplay();
}

function applyBitOp(op) {
  const ml  = document.getElementById('main-line');
  const lhs = parseIntAnyBase(ml ? ml.innerText : '0');
  if (isNaN(lhs)) return;
  bitLhs = lhs;
  pendingBitOp = op;
  if (ml) ml.innerText = '0';
  isResult = false;
}

function applyUnaryBit(label, fn) {
  const ml  = document.getElementById('main-line');
  const val = parseIntAnyBase(ml ? ml.innerText : '0');
  if (isNaN(val)) return;
  const result = fn(val) >>> 0;
  const res  = result.toString(progBase).toUpperCase();
  const expr = `${label}(${val.toString(progBase).toUpperCase()})`;
  pushStack(expr, res);
  saveHistory(expr, res);
  isResult = true;
  updateBaseDisplay();
}

/* ════════════════════════════════════════
   PROGRAMMIER-FUNKTIONEN
════════════════════════════════════════ */

function updateBaseDisplay() {
  if (currentTab !== 'prog') { baseDisplay.classList.remove('visible'); return; }
  const ml  = document.getElementById('main-line');
  const raw = ml ? ml.innerText : '0';
  const n   = parseIntAnyBase(raw);
  if (isNaN(n)) { baseDisplay.classList.remove('visible'); return; }
  baseDisplay.classList.add('visible');
  baseDisplay.innerHTML =
    `<span class="base-badge">HEX <b>${n.toString(16).toUpperCase()}</b></span>` +
    `<span class="base-badge">DEC <b>${n.toString(10)}</b></span>` +
    `<span class="base-badge">OCT <b>${n.toString(8)}</b></span>` +
    `<span class="base-badge">BIN <b>${n.toString(2)}</b></span>`;
}

/* ════════════════════════════════════════
   VERLAUF
════════════════════════════════════════ */
function saveHistory(expr, res) {
  history.unshift({ expr, res, ts: Date.now() });
  if (history.length > 50) history.pop();
  try { localStorage.setItem('ucalc_v4', JSON.stringify(history)); } catch {}
}

function openHistory() {
  renderHistoryPanel();
  document.getElementById('hist-overlay').classList.add('open');
}

function closeHistoryPanel() {
  document.getElementById('hist-overlay').classList.remove('open');
}

function closeHistory(e) {
  if (e.target === document.getElementById('hist-overlay')) closeHistoryPanel();
}

function renderHistoryPanel() {
  const list = document.getElementById('hist-list');
  list.innerHTML = '';
  if (history.length === 0) {
    list.innerHTML = '<div style="color:#334155;font-size:0.78rem;text-align:center;padding:16px;">Noch keine Berechnungen</div>';
    return;
  }
  history.forEach(item => {
    const div = document.createElement('div');
    div.className = 'hline';
    div.innerHTML = `<span class="he">${escHtml(item.expr)}</span><span class="hr">= ${escHtml(item.res)}</span>`;
    div.onclick = () => {
      stack = []; resetDisplay(String(item.res));
      isResult = true;
      closeHistoryPanel();
    };
    list.appendChild(div);
  });
}

function clearHistory() {
  history = [];
  try { localStorage.removeItem('ucalc_v4'); } catch {}
  renderHistoryPanel();
}

/* ════════════════════════════════════════
   TABS
════════════════════════════════════════ */
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', ['std','sci','prog'][i] === tab);
  });
  document.querySelectorAll('.keypad').forEach(kp => kp.classList.remove('active'));
  document.getElementById('kp-' + tab).classList.add('active');
  if (tab === 'prog') {
    setBase(progBase);
    updateBaseDisplay();
  } else {
    baseDisplay.classList.remove('visible');
  }
}

/* ════════════════════════════════════════
   TASTATUR-SUPPORT
════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key >= '0' && e.key <= '9') { append(e.key); return; }
  if (currentTab === 'prog' && /^[a-fA-F]$/.test(e.key)) { appendHex(e.key.toUpperCase()); return; }
  switch (e.key) {
    case '+':         append('+');                  break;
    case '-':         append('-');                  break;
    case '*':         append('*');                  break;
    case '/':         e.preventDefault(); append('/'); break;
    case '.':         appendDot();                  break;
    case '(':         append('(');                  break;
    case ')':         append(')');                  break;
    case '%':         append('%');                  break;
    case '&':         if(currentTab==='prog') applyBitOp('AND'); break;
    case '|':         if(currentTab==='prog') applyBitOp('OR');  break;
    case '^':         if(currentTab==='prog') applyBitOp('XOR'); break;
    case 'Enter':     calculate();                  break;
    case 'Backspace': backspace();                  break;
    case 'Escape':    clearAll();                   break;
    case 'h': case 'H': if(currentTab==='prog') setBase(16); break;
    case 'd': case 'D': if(currentTab==='prog') setBase(10); break;
    case 'o': case 'O': if(currentTab==='prog') setBase(8);  break;
    case 'b': case 'B': if(currentTab==='prog') setBase(2);  break;
  }
});

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
setBase(10);  // initialisiert Prog-Tab-Buttons
</script>
