<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultra-Calc</title>
    <link rel="icon" type="image/png" href="calculator.png">
    <link rel="apple-touch-icon" href="calculator.png">
<style>
:root {
  --bg:      #0f172a;
  --card:    #1e293b;
  --accent:  #38bdf8;
  --text:    #f8fafc;
  --muted:   #64748b;
  --dim:     #334155;
  --op:      #0ea5e9;
  --sci:     #0f2236;
  --sci-fg:  #7dd3fc;
  --prog:    #0f1f14;
  --prog-fg: #6ee7b7;
  --err:     #ef4444;
  --eq:      #0284c7;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
}

/* DISPLAY */
#display {
  flex: 0 0 auto;
  padding: 20px 14px 10px;
  background: rgba(0,0,0,0.25);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  min-height: 140px;
  position: relative;
}

#hist-icon {
  position: absolute;
  top: 10px;
  left: 10px;
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
}

.stack-line {
  text-align: right;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.stack-line.old { font-size: 0.8rem; color: var(--muted); opacity: 0.6; }
.stack-line.current { font-size: clamp(1.8rem, 6vw, 3rem); font-weight: 300; color: var(--text); margin-top: 5px; }

/* TABS */
.tabs { display: flex; background: #0a1120; border-bottom: 1px solid var(--dim); }
.tab {
  flex: 1; padding: 12px 0; font-size: 0.7rem; text-align: center;
  cursor: pointer; color: var(--muted); text-transform: uppercase;
  border: none; background: none; transition: 0.2s;
}
.tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

/* KEYPADS */
.keypad { flex: 1; display: none; grid-gap: 1px; background: var(--dim); }
.keypad.active { display: grid; }
#kp-std, #kp-sci { grid-template-columns: repeat(5, 1fr); }
#kp-prog { grid-template-columns: repeat(4, 1fr); }

button {
  border: none; background: var(--card); color: var(--text);
  font-size: 1.1rem; cursor: pointer; user-select: none;
}
button:active { filter: brightness(1.5); }
.b-op { color: var(--accent); }
.b-sci { background: var(--sci); color: var(--sci-fg); font-size: 0.85rem; }
.b-ac { color: var(--err); }
.b-eq { background: var(--eq); color: #fff; }

/* MODAL VERLAUF */
#hist-overlay {
  display: none; position: absolute; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 100;
  flex-direction: column; justify-content: flex-start;
}
#hist-overlay.open { display: flex; }
#hist-panel { background: #111827; max-height: 80%; overflow-y: auto; padding: 20px; }
.hline { padding: 10px; border-bottom: 1px solid #222; cursor: pointer; display: flex; justify-content: space-between; }
</style>
</head>
<body>

<div id="hist-overlay" onclick="this.classList.remove('open')">
  <div id="hist-panel" onclick="event.stopPropagation()">
    <div style="display:flex; justify-content: space-between; margin-bottom: 20px;">
        <span>Verlauf</span>
        <button onclick="clearHistory()" style="background:none; color:var(--err); font-size:0.8rem;">Löschen</button>
    </div>
    <div id="hist-list"></div>
  </div>
</div>

<div id="display">
  <button id="hist-icon" onclick="openHistory()">🕒</button>
  <div id="stack-container"></div>
  <div class="stack-line current" id="main-line">0</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('std')">Standard</button>
  <button class="tab" onclick="switchTab('sci')">Wissenschaft</button>
  <button class="tab" onclick="switchTab('prog')">Programmierung</button>
</div>

<div class="keypad active" id="kp-std">
  <button class="b-sci" onclick="appendConst(Math.PI)">π</button>
  <button class="b-sci" onclick="applyFunc('√', Math.sqrt)">√</button>
  <button class="b-sci" onclick="append('**2')">x²</button>
  <button class="b-sci" onclick="append('**')">xʸ</button>
  <button class="b-ac" onclick="clearAll()">AC</button>
  <button class="b-sci" onclick="append('(')">(</button>
  <button class="b-sci" onclick="append(')')">)</button>
  <button class="b-sci" onclick="append('%')">%</button>
  <button class="b-op" onclick="backspace()">⌫</button>
  <button class="b-op" onclick="append('/')">÷</button>
  <button onclick="append('7')">7</button>
  <button onclick="append('8')">8</button>
  <button onclick="append('9')">9</button>
  <button class="b-op" onclick="append('*')">×</button>
  <button class="b-op" onclick="append('-')">−</button>
  <button onclick="append('4')">4</button>
  <button onclick="append('5')">5</button>
  <button onclick="append('6')">6</button>
  <button class="b-op" onclick="append('+')">+</button>
  <button class="b-eq" style="grid-row: span 2" onclick="calculate()">=</button>
  <button onclick="append('1')">1</button>
  <button onclick="append('2')">2</button>
  <button onclick="append('3')">3</button>
  <button onclick="append('0')" style="grid-column: span 2">0</button>
  <button onclick="appendDot()">.</button>
  <button class="b-sci" onclick="negate()">±</button>
</div>

<div class="keypad" id="kp-sci">
  <button class="b-sci" onclick="append('(')">(</button>
  <button class="b-sci" onclick="append(')')">)</button>
  <button class="b-sci" onclick="append('**')">xʸ</button>
  <button class="b-sci" onclick="append('**2')">x²</button>
  <button class="b-ac" onclick="clearAll()">AC</button>
  <button class="b-sci" onclick="applyFunc('sin', x => Math.sin(x * Math.PI/180))">sin</button>
  <button class="b-sci" onclick="applyFunc('cos', x => Math.cos(x * Math.PI/180))">cos</button>
  <button class="b-sci" onclick="applyFunc('tan', x => Math.tan(x * Math.PI/180))">tan</button>
