<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultra-Calc</title>
    <link rel="icon" type="image/png" href="calculator.png">
    <link rel="apple-touch-icon" href="calculator.png">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --num: #334155;
            --op: #0ea5e9;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Kurz-Verlauf Bereich */
        .mini-history {
            flex: 0 0 20%;
            background: #00000030;
            padding: 10px 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            gap: 2px;
            overflow-y: auto;
        }

        .hist-line {
            font-size: 0.9rem;
            color: #64748b;
            text-align: right;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .hist-line:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--accent);
        }

        .display-section {
            flex: 0 0 12%;
            padding: 0 20px 15px 20px;
            text-align: right;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
        }

        #main-line {
            font-size: 3rem;
            font-weight: 300;
            width: 100%;
            overflow-x: auto;
            /* Kein Zeilenumbruch, horizontales Scrollen bei langen Ausdrücken */
            white-space: nowrap;
        }

        /* Keyboard */
        .keypad {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1px;
            background: #334155;
        }

        button {
            border: none;
            background: var(--card);
            color: white;
            font-size: 1.15rem;
            cursor: pointer;
            transition: background 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        button:active { background: var(--num); filter: brightness(1.3); }
        .btn-op    { color: var(--accent); font-weight: bold; }
        .btn-sci   { background: #162031; color: #94a3b8; font-size: 0.9rem; }
        .btn-equal { background: var(--op); font-weight: bold; }
        .btn-ac    { color: #ef4444; }
    </style>
</head>
<body>

    <div class="mini-history" id="mini-history"></div>

    <div class="display-section">
        <div id="main-line">0</div>
    </div>

    <div class="keypad">
        <button class="btn-sci" onclick="appendConst(Math.PI, 'π')">π</button>
        <button class="btn-sci" onclick="appendConst(Math.E,  'e')">e</button>
        <button class="btn-sci" onclick="append('**')">xʸ</button>
        <button class="btn-sci" onclick="appendFunc('Math.sqrt')">√</button>
        <button class="btn-ac"  onclick="clearAll()">AC</button>

        <button class="btn-sci" onclick="appendFunc('Math.sin')">sin</button>
        <button class="btn-sci" onclick="appendFunc('Math.cos')">cos</button>
        <button class="btn-sci" onclick="append('(')">(</button>
        <button class="btn-sci" onclick="append(')')">)</button>
        <button class="btn-op"  onclick="backspace()">⌫</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button class="btn-op"  onclick="append('/')">÷</button>
        <button class="btn-sci" onclick="appendFunc('Math.log10')">log</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button class="btn-op"  onclick="append('*')">×</button>
        <button class="btn-sci" onclick="appendFunc('Math.abs')">|x|</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button class="btn-op"  onclick="append('-')">−</button>
        <button class="btn-equal" style="grid-row: span 2;" onclick="calculate()">=</button>

        <button onclick="append('0')" style="grid-column: span 2;">0</button>
        <button onclick="appendDot()">.</button>
        <button class="btn-op" onclick="append('+')">+</button>
    </div>

    <script>
        const mainLine    = document.getElementById('main-line');
        const miniHistory = document.getElementById('mini-history');

        // Verlauf aus localStorage laden
        let history = [];
        try {
            history = JSON.parse(localStorage.getItem('ultra_calc_v2_1')) || [];
        } catch {
            history = [];
        }

        let isResultDisplayed = false;

        /* ── Hilfsfunktionen ─────────────────────────────────────── */

        /** Aktuellen Anzeigetext holen */
        function getDisplay() { return mainLine.innerText; }

        /** Aktuellen Anzeigetext setzen */
        function setDisplay(val) { mainLine.innerText = val; }

        /* ── Eingabe-Funktionen ──────────────────────────────────── */

        /**
         * Zeichen/Operator anhängen.
         * Operatoren (nicht-numerische Werte außer '.') hängen sich ans Ergebnis;
         * Ziffern starten einen neuen Ausdruck.
         */
        function append(val) {
            const isOperator = isNaN(val) && val !== '.';

            if (isResultDisplayed) {
                if (isOperator) {
                    // Weiterrechnen mit vorherigem Ergebnis
                    isResultDisplayed = false;
                } else {
                    // Neue Eingabe beginnen
                    setDisplay('0');
                    isResultDisplayed = false;
                }
            }

            const current = getDisplay();

            if (current === '0' && !isNaN(val) && val !== '.') {
                setDisplay(val);
            } else {
                setDisplay(current + val);
            }
        }

        /**
         * Dezimalpunkt anfügen – verhindert doppelten Punkt
         * in der letzten Zahl des Ausdrucks.
         */
        function appendDot() {
            if (isResultDisplayed) {
                setDisplay('0');
                isResultDisplayed = false;
            }
            const current = getDisplay();
            // Letzten Zahlen-Token extrahieren
            const tokens = current.split(/[+\-*/()]/);
            const lastToken = tokens[tokens.length - 1];
            if (lastToken.includes('.')) return; // bereits ein Punkt vorhanden
            setDisplay(current + '.');
        }

        /**
         * Mathematische Konstante (π, e) als gerundeten Wert einfügen.
         * @param {number} value   – JS-Wert (Math.PI, Math.E …)
         * @param {string} display – Anzeige-Symbol (optional, nur für Lesbarkeit)
         */
        function appendConst(value, display) {
            if (isResultDisplayed) {
                setDisplay('0');
                isResultDisplayed = false;
            }
            const rounded = parseFloat(value.toFixed(10));
            const current = getDisplay();
            if (current === '0') {
                setDisplay(String(rounded));
            } else {
                setDisplay(current + rounded);
            }
        }

        /**
         * Funktionsname + '(' anhängen (sin, cos, sqrt …).
         * Berücksichtigt isResultDisplayed korrekt.
         */
        function appendFunc(name) {
            if (isResultDisplayed) {
                // Funktion auf Ergebnis anwenden
                isResultDisplayed = false;
                setDisplay(name + '(' + getDisplay());
            } else {
                setDisplay(getDisplay() === '0' ? name + '(' : getDisplay() + name + '(');
            }
        }

        /* ── Berechnung ──────────────────────────────────────────── */

        /**
         * Sicherer Ausdruck-Evaluator.
         * Erlaubt nur Ziffern, Operatoren, Klammern und Math.*-Aufrufe.
         * Kein direktes eval() mit beliebigem Code.
         */
        function safeEval(expr) {
            // Anzeigesymbole normalisieren (globales Replace mit /g)
            expr = expr
                .replace(/×/g, '*')
                .replace(/÷/g, '/')
                .replace(/−/g, '-');

            // Whitelist: Nur erlaubte Zeichen/Tokens
            if (!/^[0-9+\-*/().eE\s]*$/.test(
                expr.replace(/Math\.(sin|cos|tan|sqrt|log|log10|log2|abs|ceil|floor|round|PI|E)\b/g, '')
            )) {
                throw new Error('Ungültiger Ausdruck');
            }

            // Absicherung gegen Division durch 0
            // (wird durch Number-Ergebnis Infinity bereits abgedeckt, aber explizit prüfen)
            // eslint-disable-next-line no-new-func
            const result = Function(
                '"use strict"; const Math = globalThis.Math; return (' + expr + ')'
            )();

            if (!isFinite(result)) throw new Error('Division durch 0 oder ungültig');
            return result;
        }

        function calculate() {
            try {
                const expr   = getDisplay();
                const result = safeEval(expr);

                // Präzise Formatierung: Ganzzahl oder max. 8 Nachkommastellen
                const formatted = Number.isInteger(result)
                    ? result
                    : parseFloat(result.toFixed(8));

                saveHistory(expr, formatted);
                setDisplay(String(formatted));
                isResultDisplayed = true;
            } catch {
                setDisplay('Error');
                isResultDisplayed = true;
            }
        }

        /* ── Verlauf ─────────────────────────────────────────────── */

        function saveHistory(expr, res) {
            history.unshift({ expr, res });
            if (history.length > 30) history.pop();
            try {
                localStorage.setItem('ultra_calc_v2_1', JSON.stringify(history));
            } catch { /* Kein localStorage (z.B. Private Mode) – stumm ignorieren */ }
            updateMiniHistory();
        }

        function updateMiniHistory() {
            miniHistory.innerHTML = '';
            // Neueste Einträge unten → slice + reverse
            history.slice(0, 6).reverse().forEach(item => {
                const div = document.createElement('div');
                div.className = 'hist-line';
                div.title     = `${item.expr} = ${item.res}`; // Tooltip bei langen Ausdrücken
                div.innerText = `${item.expr} = ${item.res}`;
                div.onclick   = () => {
                    setDisplay(String(item.res));
                    isResultDisplayed = true;
                };
                miniHistory.appendChild(div);
            });
        }

        /* ── AC / Backspace ─────────────────────────────────────── */

        function clearAll() {
            setDisplay('0');
            isResultDisplayed = false;
        }

        function backspace() {
            if (isResultDisplayed) {
                clearAll();
                return;
            }
            const current = getDisplay();
            setDisplay(current.slice(0, -1) || '0');
        }

        /* ── Tastatur-Support ───────────────────────────────────── */

        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') { append(e.key); return; }
            switch (e.key) {
                case '+':        append('+');     break;
                case '-':        append('-');     break;
                case '*':        append('*');     break;
                case '/':        e.preventDefault(); append('/'); break;
                case '.':        appendDot();     break;
                case '(':        append('(');     break;
                case ')':        append(')');     break;
                case 'Enter':    calculate();     break;
                case 'Backspace':backspace();      break;
                case 'Escape':   clearAll();      break;
            }
        });

        /* ── Init ───────────────────────────────────────────────── */
        updateMiniHistory();
    </script>
</body>
</html>
